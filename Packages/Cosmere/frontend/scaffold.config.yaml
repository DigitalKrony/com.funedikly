extend:
  - dir: ./src/components
    friendlyName: Add Unit Test file
    nameCase: pascal
    structure:
      - type: folder
        name: tests
        content:
          - type: file
            suffix: .test
            extension: tsx
            content:
              src: ./../../../.common/templates/Component.test.tsx
  - dir: ./src/components
    friendlyName: Add Visual Test file
    nameCase: pascal
    structure:
      - type: folder
        name: tests
        content:
          - type: file
            suffix: .spec
            extension: ts
            content:
              src: ./../../../.common/templates/Component.spec.ts

create:
  - dest: ./src/components/
    friendlyName: FunctionComponent(FC)
    nameCase: pascal
    structure:
      - type: file
        name: index
        extension: ts
        content:
          src: ./../../../.common/templates/index.ts
      - type: file
        suffix: .styles
        extension: ts
        content:
          src: ./../../../.common/templates/FC/Component.styles.ts
      - type: file
        suffix: .types
        extension: ts
        content:
          src: ./../../../.common/templates/FC/Component.types.ts
      - type: file
        extension: tsx
        content:
          src: ./../../../.common/templates/FC/Component.base.tsx
      - type: folder
        name: stories
        content:
          - type: file
            name: index
            extension: ts
            content:
              src: ./../../../.common/templates/index.stories.ts
          - type: file
            suffix: .stories
            extension: tsx
            content:
              src: ./../../../.common/templates/Component.stories.tsx
  - dest: ./src/components/
    friendlyName: Simple Component | ForwardRefComponent w/ Tests w/o State & Context
    nameCase: pascal
    structure:
      - type: file
        prefix: render
        extension: tsx
        content:
          src: ./../../../.common/templates/SimpleComponent/Component.base.tsx
      - type: file
        name: index
        extension: ts
        content:
          src: ./../../../.common/templates/index.ts
      - type: file
        extension: tsx
        content:
          src: ./../../../.common/templates/SimpleComponent/Component.tsx
      - type: file
        suffix: .types
        extension: ts
        content:
          src: ./../../../.common/templates/SimpleComponent/Component.types.ts
      - type: file
        prefix: use
        extension: ts
        content:
          src: ./../../../.common/templates/useComponent.ts
      - type: file
        prefix: use
        suffix: Styles
        extension: ts
        content:
          src: ./../../../.common/templates/SimpleComponent/Component.styles.ts
      - type: folder
        name: tests
        content:
          - type: file
            suffix: .test
            extension: tsx
            content:
              src: ./../../../.common/templates/Component.test.tsx
          - type: file
            suffix: .spec
            extension: ts
            content:
              src: ./../../../.common/templates/Component.spec.ts
      - type: folder
        name: stories
        content:
          - type: file
            name: index
            extension: ts
            content:
              src: ./../../../.common/templates/index.stories.ts
          - type: file
            suffix: .stories
            extension: tsx
            content:
              src: ./../../../.common/templates/Component.stories.tsx
  - dest: ./src/components/
    friendlyName: Full Component | ForwardRefComponent w/ Tests, State, & Context
    nameCase: pascal
    structure:
      - type: file
        name: index
        extension: ts
        content:
          src: ./../../../.common/templates/index.ts
      - type: file
        extension: tsx
        content:
          src: ./../../../.common/templates/FullComponent/Component.tsx
      - type: file
        prefix: use
        suffix: ContextValues
        extension: ts
        content:
          src: ./../../../.common/templates/FullComponent/useComponentContextValues.ts
      - type: file
        suffix: Context
        extension: ts
        content:
          src: ./../../../.common/templates/FullComponent/ComponentContext.ts
      - type: file
        suffix: .types
        extension: ts
        content:
          src: ./../../../.common/templates/FullComponent/Component.types.ts
      - type: file
        prefix: render
        extension: tsx
        content:
          src: ./../../../.common/templates/FullComponent/renderComponent.tsx
      - type: file
        prefix: use
        extension: ts
        content:
          src: ./../../../.common/templates/useComponent.ts
      - type: file
        prefix: use
        suffix: Styles
        extension: ts
        content:
          src: ./../../../.common/templates/FullComponent/useComponentStyles.ts
      - type: folder
        name: tests
        content:
          - type: file
            suffix: .test
            extension: tsx
            content:
              src: ./../../../.common/templates/Component.test.tsx
          - type: file
            suffix: .spec
            extension: ts
            content:
              src: ./../../../.common/templates/Component.spec.ts
      - type: folder
        name: stories
        content:
          - type: file
            name: index
            extension: ts
            content:
              src: ./../../../.common/templates/index.stories.ts
          - type: file
            suffix: .stories
            extension: tsx
            content:
              src: ./../../../.common/templates/Component.stories.tsx
